# Default configuration for ST-Trace

# Dataset
dataset: "nlpr_mct"
split: "test"
data_root: "./data/raw"
output_root: "./data/processed"

# ST-ANBS hyperparameters
gamma: 0.9          # Discount factor for path scoring
lambda_length: 0.1  # Length penalty coefficient
beam_width: 5       # Beam width B
max_depth: 4        # Maximum search depth D_max
max_duration_min: 15 # Maximum trajectory duration in minutes
score_threshold: -10.0 # Minimum score to continue search

# ReID hyperparameters
lambda_triplet: 0.5
lambda_st: 0.3      # Weight for spatio-temporal contrastive loss
temperature: 0.07   # InfoNCE temperature
triplet_margin: 0.3
similarity_threshold: 0.75 # ReID similarity threshold
alpha_adaptive: 0.0 # 0 = fixed threshold, >0 = adaptive: τ = μ + α·σ

# Model architecture
transition_net:
  edge_dim: 4
  temporal_dim: 2
  hidden_dim: 256
  lstm_hidden_dim: 128
  dropout: 0.3

reid:
  backbone: "transreid_base"
  feature_dim: 768
  img_height: 256
  img_width: 128

# Training
training:
  transition_lr: 1e-3
  transition_epochs: 50
  transition_batch: 64
  reid_lr: 3e-4
  reid_epochs: 120
  reid_batch: 64

# Inference
inference:
  keyframe_fps: 1.0
  detection_conf: 0.25
  iterative_refinement: true
